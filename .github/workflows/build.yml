name: Build and commit CSS

on:
  push:
    branches: [main]
    paths-ignore:
      - 'concrete.extras.css'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: ./build.sh

      - name: Commit concrete.extras.css
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add concrete.extras.css
          git diff --staged --quiet || git commit -m "Build concrete.extras.css" && git push
