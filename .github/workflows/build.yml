name: Build and commit CSS

on:
  push:
    branches: [main]
    paths-ignore:
      - 'concrete.extras.css'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: ./build.sh

      - name: Commit concrete.extras.css
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add concrete.extras.css
          git diff --staged --quiet || git commit -m "Build concrete.extras.css" && git push

      - name: Deploy to gh-pages
        run: |
          cp concrete.extras.css /tmp/concrete.extras.css
          cp demo.html /tmp/index.html
          if git fetch origin gh-pages:gh-pages 2>/dev/null; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . || true
          fi
          git rm -rf . || true
          cp /tmp/concrete.extras.css concrete.extras.css
          cp /tmp/index.html index.html
          git add concrete.extras.css index.html
          git diff --staged --quiet || git commit -m "Deploy to gh-pages"
          git push origin gh-pages
